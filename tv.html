        display: flex;
        flex-direction: column;

        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
      }

      .logo-group { display: flex; align-items: center; gap: 10px; }

      .logo-icon {
        width: 40px; height: 40px;
        background: #2563eb;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
      }

      .logo-svg { width: 22px; height: 22px; fill: #fff; }

      .brand {
        font-size: 26px;
        font-weight: 900;
        color: #fff;
        display: flex; align-items: center; gap: 8px;
      }

      .tv-badge {
        font-size: 10px; font-weight: 800; text-transform: uppercase;
        background: #059669; color: #fff;
        padding: 3px 8px; border-radius: 6px;
      }

      .badge {
        font-size: 10px; font-weight: 800; text-transform: uppercase;
        background: #059669; color: #fff;
        padding: 3px 8px; border-radius: 6px;
      }

      /* ── Main Grid ── */
      .main-grid {
        display: grid;
        grid-template-columns: 2.5fr 1fr;
        gap: 20px;
        align-items: start;
      }

      /* ── Player ── */
      .player-card {
        background: #000;
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
      }

      .player-inner {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
      }

      video {
        width: 100%; height: 100%;
        object-fit: contain;
        background: #000;
        display: block;
      }

      #iframe-player {
        display: none;
        width: 100%; height: 100%;
        border: none;
        position: absolute; inset: 0;
      }

      /* ── Sidebar ── */
      .channels-panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;

      .section-title {

        text-transform: uppercase; letter-spacing: 0.05em;

        background: rgba(255,255,255,0.02);
        border: 1px solid var(--border);
        padding: 12px; border-radius: 10px;
        cursor: pointer; text-align: left; color: inherit;
        width: 100%; font-family: inherit;
        position: relative;
      }

      .channel-btn.active {
        background: rgba(37,99,235,0.12);
        border-color: var(--accent);
      }

      .ch-icon {
        width: 40px; height: 40px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        border: 1px solid rgba(255,255,255,0.04);
        overflow: hidden;

      .ch-icon img { width: 40px; height: 40px; object-fit: cover; }

      .ch-info { flex: 1; min-width: 0; }

      .ch-name { font-size: 13px; font-weight: 700; }

      .ch-tag {
        display: inline-block;
        font-size: 8px; font-weight: 700; text-transform: uppercase;
        padding: 1px 5px; border-radius: 3px; margin-top: 3px;
        background: rgba(37,99,235,0.12); color: #93c5fd;
      }

      .channel-btn.active .ch-tag { background: rgba(16,185,129,0.12); color: #34d399; }

      .ch-status-badge {
        position: absolute; top: 6px; right: 6px;
        font-size: 7px; font-weight: 800; text-transform: uppercase;
        padding: 2px 5px; border-radius: 99px;
        display: flex; align-items: center; gap: 3px;

      .ch-status-badge.live { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

      .ch-status-badge.offline .ch-status-dot { background: #ef4444; }

        display: flex; align-items: center; gap: 10px;

        padding: 3px 8px; border-radius: 99px;

      .match-time { font-size: 11px; font-weight: 800; color: #93c5fd; }

      .match-time-tag {

        color: var(--muted);
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);

    const videoEl  = document.getElementById('video');

    // ── Schedule rendering ──
    const MATCH_DURATION_MS = 2 * 60 * 60 * 1000;
    let activeDay = null;

    function getUpcoming() {
      const now = Date.now();
      return matches.filter(m => (new Date(m.dt).getTime() + MATCH_DURATION_MS) > now);
    }

    // Lazy flag: only set src when image enters viewport
    function flagImg(code) {
      if (!code) return '<span style="font-size:14px">🏳️</span>';
      const src = `https://flagcdn.com/24x18/${code}.png`;
      return `<img class="flag" loading="lazy" src="${src}" alt="${code}" />`;
    }

    function renderSchedule() {
      const now = Date.now();
      const upcoming = getUpcoming();
      const days = [...new Set(upcoming.map(m => m.date))];
      const dayTabsEl  = document.getElementById('day-tabs');
      const matchListEl = document.getElementById('match-list');

      if (!activeDay || !days.includes(activeDay)) activeDay = days[0] || null;

      dayTabsEl.innerHTML = '';
      days.forEach(day => {
        const tab = document.createElement('button');
        tab.className = 'day-tab' + (day === activeDay ? ' active' : '');
        tab.textContent = day;
        tab.onclick = () => { activeDay = day; renderSchedule(); };
        dayTabsEl.appendChild(tab);
      });

      matchListEl.innerHTML = '';

      if (!days.length) {
        matchListEl.innerHTML = '<p style="font-size:12px;color:var(--muted);padding:20px;text-align:center">All group stage matches have finished.</p>';
        return;
      }

      const frag = document.createDocumentFragment();
      upcoming.filter(m => m.date === activeDay).forEach(m => {
        const start = new Date(m.dt).getTime();
        const end   = start + MATCH_DURATION_MS;
        const nowMs = now;
        const isLive     = nowMs >= start && nowMs < end;
        const isFinished = nowMs >= end;

        const card = document.createElement('div');
        card.className = 'match-card' + (isLive ? ' is-live' : '') + (isFinished ? ' is-finished' : '');
        card.innerHTML = `
          <div class="match-card-top">
            <span class="match-time">${m.time}</span>
            <span class="match-time-tag${isLive?' live':''}">${isLive?'🔴 Live':isFinished?'✅ FT':'BST'}</span>
          </div>
          ${isLive ? `<div class="score-box">
            <span class="score-num" style="color:var(--muted)">–</span>
            <span class="score-divider"> </span>
            <span class="score-num" style="color:var(--muted)">–</span>
          </div><div class="score-minute">⏱ LIVE</div>` : ''}
          <div class="match-vs">
            <div class="match-team">${flagImg(m.c1)}<span class="match-team-name">${m.t1}</span></div>
            <span class="vs-sep">VS</span>
            <div class="match-team">${flagImg(m.c2)}<span class="match-team-name">${m.t2}</span></div>
          </div>
          <div class="match-venue">📍 ${m.venue}</div>
        `;
        frag.appendChild(card);
      });
      matchListEl.appendChild(frag);
    }

    // ── Channel UI ──
    function setStatus(btn, state) {
      if (!btn) return;
      const badge = btn.querySelector('.ch-status-badge');
      if (!badge) return;
      const dot = '<span class="ch-status-dot"></span>';
      if (state === 'live')    { badge.className = 'ch-status-badge live';    badge.innerHTML = dot + 'LIVE'; }
      else if (state === 'offline') { badge.className = 'ch-status-badge offline'; badge.innerHTML = dot + 'OFFLINE'; }
      else                          { badge.className = 'ch-status-badge checking'; badge.innerHTML = dot + '...'; }
    }

    function getActiveBtn() {
      return listEl.querySelector('.channel-btn.active');
    }

    function showVideo() {
      videoEl.style.display = 'block';
      iframeEl.style.display = 'none';
      iframeEl.src = '';
    }

    function showIframe(url) {
      videoEl.style.display = 'none';
      iframeEl.style.display = 'block';
      iframeEl.src = url;
    }
    async function play(ch, btn) {
      // Cleanup
      if (hls) { hls.destroy(); hls = null; }
      if (shakaPlayer) { try { await shakaPlayer.destroy(); } catch(e){} shakaPlayer = null; }

      activeUrl = ch.url;

      // Update active highlight
      listEl.querySelectorAll('.channel-btn').forEach(b => {
        b.classList.remove('active');
        const t = b.querySelector('.ch-tag');
        if (t) t.textContent = b.dataset.tag;
      });
      btn.classList.add('active');
      const activeTag = btn.querySelector('.ch-tag');
      if (activeTag) activeTag.textContent = 'Watching';

      setStatus(btn, 'checking');

      if (ch.format === 'iframe') {
        showIframe(ch.url);
        setStatus(btn, 'live');
        return;
      }

      showVideo();

      if (ch.format === 'dash' && window.shaka) {
        window.shaka.polyfill.installAll();
        if (!window.shaka.Player.isBrowserSupported()) { setStatus(btn, 'offline'); return; }
        shakaPlayer = new window.shaka.Player(videoEl);
        if (ch.drm) shakaPlayer.configure({ drm: { clearKeys: ch.drm.clearKeys } });
        shakaPlayer.addEventListener('error', () => setStatus(btn, 'offline'));
        try { await shakaPlayer.load(ch.url); setStatus(btn, 'live'); }
        catch(e) { setStatus(btn, 'offline'); }
        return;
      }

      // HLS
      if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
        videoEl.src = ch.url;
        videoEl.onloadeddata = () => setStatus(btn, 'live');
        videoEl.onerror      = () => setStatus(btn, 'offline');
      } else if (window.Hls && window.Hls.isSupported()) {
        hls = new window.Hls({
          enableWorker: false,         // TV: disable web worker (saves memory)
          lowLatencyMode: false,       // TV: don't try to minimize latency
          backBufferLength: 10,        // TV: tiny back buffer
          maxBufferLength: 20,         // TV: was 30
          maxMaxBufferLength: 30,      // TV: was 60
          manifestLoadingMaxRetry: 3,
          fragLoadingMaxRetry: 4,
          fragLoadingRetryDelay: 1500
        });
        hls.loadSource(ch.url);
        hls.attachMedia(videoEl);
        hls.on(window.Hls.Events.MANIFEST_PARSED, () => setStatus(btn, 'live'));
        let retries = 0;
        hls.on(window.Hls.Events.ERROR, (_, d) => {
          if (!d.fatal) return;
          if (d.type === window.Hls.ErrorTypes.NETWORK_ERROR && retries++ < 2) {
            setTimeout(() => hls && hls.startLoad(), 2000);
          } else if (d.type === window.Hls.ErrorTypes.MEDIA_ERROR) {
            hls && hls.recoverMediaError();
          } else {
            setStatus(btn, 'offline');
          }
        });
        videoEl.addEventListener('playing', () => { retries = 0; }, { passive: true });
      } else {
        setStatus(btn, 'offline');
      }
    }

    function renderChannels() {
      const frag = document.createDocumentFragment();
      channels.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'channel-btn';
        btn.dataset.tag = ch.tag;
        btn.innerHTML = `
          <div class="ch-icon"><img src="${_iconUrl}" alt="" width="40" height="40" loading="lazy"/></div>
          <div class="ch-info">
            <div class="ch-name">${ch.name}</div>
            <span class="ch-tag">${ch.tag}</span>
          </div>
          <span class="ch-status-badge checking"><span class="ch-status-dot"></span>...</span>
        `;
        btn.onclick = () => play(ch, btn);
        frag.appendChild(btn);
      });
      listEl.appendChild(frag);
    }

    // ── Staggered health checks (2s apart instead of 400ms) ──
    function runHealthChecks() {
      const btns = listEl.querySelectorAll('.channel-btn');
      channels.forEach((ch, i) => {
        setTimeout(async () => {
          const btn = btns[i];
          if (!btn || ch.url === activeUrl) return;
          if (ch.format === 'iframe' || ch.skipCheck) {
            setStatus(btn, 'live'); return;
          }
          try {
            const ctrl = new AbortController();
            const t = setTimeout(() => ctrl.abort(), 6000);
            await fetch(ch.url, { method:'HEAD', signal:ctrl.signal, mode:'no-cors' });
            clearTimeout(t);
            setStatus(btn, 'live');
          } catch(e) {
            setStatus(btn, 'offline');
          }
        }, i * 2000); // 2s stagger — was 400ms
      });
    }

    // ── Staged boot ──
    async function boot() {
      setProgress(15);

      // Stage 1: Render schedule (no network needed)
      renderSchedule();
      setProgress(35);

      // Stage 2: Render channel list
      renderChannels();
      setProgress(55);

      // Stage 3: Load HLS.js dynamically (don't block initial paint)
      await new Promise(resolve => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js';
        s.onload = resolve;
        s.onerror = resolve; // continue even if it fails
        document.head.appendChild(s);
      });
      setProgress(75);

      // Stage 4: Load Shaka only if needed (defer 3s so HLS gets to settle)
      setTimeout(() => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js';
        document.head.appendChild(s);
      }, 3000);

      setProgress(90);

      // Stage 5: Auto-play first channel
      const firstBtn = listEl.querySelector('.channel-btn');
      if (firstBtn) play(channels[0], firstBtn);

      setProgress(100);

      // Show app, hide loader
      setTimeout(() => {
        document.getElementById('tv-loader').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        // Stage 6: Health checks after everything is visible (5s delay)
        setTimeout(runHealthChecks, 5000);

        // Schedule refresh every 3 minutes (was 2 min)
        setInterval(renderSchedule, 3 * 60 * 1000);

      }, 400);
    }

    // Start boot after DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
